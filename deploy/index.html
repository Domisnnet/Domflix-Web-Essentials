<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Domflix</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="dist/css/reset.css" />
    <link rel="stylesheet" href="dist/css/styles.css" />

  <body>
    <main class="conteudo-principal">

            <figure class="avatar-container">
              <span class="imagem-perfil" aria-hidden="true">
                <span class="icone-avatar">
                  <img
                    src="src/assets/1.webp"
                    alt="Perfil de Fernanda"
                    width="128"
                    height="128"
                  />
                </span>
              </span>
              <figcaption class="nome-perfil">Fernanda</figcaption>
            </figure>
          </a>
        </li>
        <li class="item-perfil">
          <a href="src/pages/catalogo.html" class="perfil">
            <figure class="avatar-container">
              <span class="imagem-perfil" aria-hidden="true">
                <span class="icone-avatar">
                  <img
                    src="src/assets/2.webp"
                    alt="Perfil do Guilherme"
                    width="128"
                    height="128"
                  />
                </span>
              </span>
              <figcaption class="nome-perfil">Guilherme</figcaption>

        <li class="item-perfil">
          <a href="src/pages/catalogo.html" class="perfil">
            <figure class="avatar-container">

                    width="128"
                    height="128"
                  />
                </span>
              </span>
              <figcaption class="nome-perfil">Thamiris</figcaption>

          </a>
        </li>
        <li class="item-perfil">
          <a href="src/pages/catalogo.html" class="perfil">
            <figure class="avatar-container">
              <span class="imagem-perfil" aria-hidden="true">
                <span class="icone-avatar">
                  <img src="src/assets/4.png" alt="Perfil do Dominique" />
                </span>
              </span>
              <figcaption class="nome-perfil">Dominique</figcaption>
            </figure>
          </a>
        </li>
      </ul>
      <section class="gerenciar">
        <button type="button" class="botao-gerenciar">Gerenciar Perfis</button>
      </section>
    </main>
    <script src="src/js/index.js"></script>
